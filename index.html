<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>健康追蹤系統</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="container">
    <h1>健康追蹤系統</h1>

    <div id="profileSection" class="card"></div>

    <div id="recordSection" class="card hidden">
      <h2>新增健康數據</h2>
      <p class="hint">沒有量到的項目可以空白。</p>

      <form id="recordForm">
        <input type="number" step="0.1" id="height" placeholder="身高 cm（可空白）" />
        <input type="number" step="0.1" id="weight" placeholder="體重 kg（可空白）" />
        <input type="number" id="sbp" placeholder="收縮壓 mmHg（可空白）" />
        <input type="number" id="dbp" placeholder="舒張壓 mmHg（可空白）" />
        <input type="number" id="heartRate" placeholder="心律 bpm（可空白）" />
        <input type="number" id="spo2" placeholder="血氧 %（可空白）" />
        <input type="number" step="0.1" id="temperature" placeholder="體溫 °C（可空白）" />

        <button type="submit">儲存健康數據</button>
      </form>
    </div>

    <div id="statusSection" class="card hidden">
      <h2>最新健康狀態</h2>
      <div id="statusGrid" class="status-grid"></div>
    </div>

    <div id="averageSection" class="card hidden">
      <h2>最近七天平均值</h2>
      <p class="hint">系統會自動計算最近 7 天內有填寫的資料平均，空白項目不列入計算。</p>
      <div id="averageGrid" class="status-grid"></div>
    </div>

    <div id="chartSection" class="card hidden">
      <h2>趨勢圖</h2>
      <canvas id="healthChart"></canvas>
    </div>

    <div id="historySection" class="card hidden">
      <h2>歷史紀錄</h2>
      <button class="danger" onclick="clearRecords()">清除所有健康紀錄</button>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>時間</th>
              <th>身高</th>
              <th>體重</th>
              <th>BMI</th>
              <th>收縮壓</th>
              <th>舒張壓</th>
              <th>心律</th>
              <th>血氧</th>
              <th>體溫</th>
            </tr>
          </thead>
          <tbody id="historyTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
